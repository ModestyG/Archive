{% extends 'base.html' %}
{% block body %}
    
    <h1>Posts for tag: {{ tag_name }}</h1>

    {% for post in posts %}
    <div class="post-div">
        <h2>{{post.title | safe}}</h2>
        <p>{{post.content | safe}}</p><br>
        <p>Tags: 
            {% for tag in post.tags %}
                <a href="{{ url_for('view_tag', tag_name=tag) }}">#{{ tag }}</a>
            {% endfor %}
        </p>
        <p>By <a href="{{ url_for('collections', target_user=post.username)}}">{{ post.username }}</a></p>
    </div>
    {% endfor %}

{% endblock %}
